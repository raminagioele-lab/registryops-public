name: Registry Integrity Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail on forbidden files (.DS_Store, AppleDouble)
        run: |
          if find . -name ".DS_Store" -o -name "._*" | grep -q .; then
            echo "Forbidden macOS metadata files found (.DS_Store / ._*)."
            find . -name ".DS_Store" -o -name "._*" -print
            exit 1
          fi
          echo "No forbidden macOS metadata files found."

      - name: Ensure current/ exists (public mirror requirement)
        run: |
          if [ -d "current" ]; then
            echo "Found current/ directory."
          else
            echo "Missing current/ directory."
            exit 1
          fi

      - name: Ensure journal exists
        run: |
          if [ -f "current/journal/events.jsonl" ]; then
            echo "Journal found."
          else
            echo "Missing current/journal/events.jsonl"
            exit 1
          fi

      - name: Ensure phase 1 integrity artifacts exist
        run: |
          if [ -f "current/integrity/publication_manifest.json" ] && [ -f "current/integrity/merkle_root.txt" ] && [ -f "current/integrity/proof_status.json" ]; then
            echo "Phase 1 integrity artifacts found."
          else
            echo "Missing phase 1 integrity artifacts."
            exit 1
          fi

      - name: Ensure hardened immutability ledger exists
        run: |
          if [ -f "immutability_ledger.json" ]; then
            echo "Immutability ledger found."
          else
            echo "Missing immutability_ledger.json"
            exit 1
          fi

      - name: Ensure the independent public verifier exists
        run: test -f verify_registryops.py
