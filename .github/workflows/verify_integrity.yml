name: Verify Public Registry Integrity

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install contract verifier dependencies
        run: python -m pip install jsonschema

      - name: Verify current contract and complete history
        run: python verify_registryops.py --public-root "$GITHUB_WORKSPACE"
