name: Verify Public Registry Integrity

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify integrity
        run: |
          set -e

          if [ ! -f "current/journal/events.jsonl" ]; then
            echo "No journal found."
            exit 1
          fi

          CALC_SHA=$(sha256sum current/journal/events.jsonl | awk '{print $1}')
          STORED_SHA=$(jq -r .events_sha256 current/integrity/integrity.json)

          echo "Calculated SHA: $CALC_SHA"
          echo "Stored SHA:     $STORED_SHA"

          if [ "$CALC_SHA" != "$STORED_SHA" ]; then
            echo "Integrity mismatch!"
            exit 1
          fi

          echo "Integrity verified."
